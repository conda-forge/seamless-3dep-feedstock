{% set name = "seamless-3dep" %}
{% set version = "0.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/seamless_3dep-{{ version }}.tar.gz
  sha256: 4bfa0013a42e27868d0c62b4889f7dbb9b2c76a22b90248098e44cd3dbaa8bed

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatch-vcs
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - tiny-retriever >=0.1.1
    - libgdal-core
    - rasterio
    - numpy >=2

test:
  imports:
    - seamless_3dep
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Streamlined Access to USGS 3DEP Topographic Data
  license: MIT
  license_file: LICENSE
  home: https://seamless-3dep.readthedocs.io
  doc_url: https://seamless-3dep.readthedocs.io
  dev_url: https://github.com/hyriver/seamless-3dep

extra:
  recipe-maintainers:
    - cheginit
